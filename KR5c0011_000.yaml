front:
  text: 七經同卷傷四
  hash: sha256:710d2884d8261d8aaf3b9d83d23d3c88fdd01dc2e671f93abaff2c2ce6e7d748
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0011_HFL_000-001a, image: hfl/0341/0341-141.png}
body:
  text: 太上老君説救生真經太上老君説消災經太上太清天童護命妙經太上太清皇老帝君運雷天童隱梵仙經太上老君説安宅八陽經太上老君説補謝八陽經太上説十錬生神救護經太上老君説救生真經爾時太上老君與八千徒衆在紫微宫中琉璃七寶殿上廣説妙法讃歎世間中國男子女人光如日月持齋存念真經所有非災橫禍盡乞消除廣布受生延年益算千𡨚和釋萬惡潛藏災害不生禍亂不作罪障消沉福祥臻集爾時太上老君敕令六甲六丁守護受經之人常使永無殃咎疾病不侵四時平善八節康寧盜賊潛藏妖怪伏匿念誦此經一七偏至二七遍乃至三七遍功德無量慕道皆成常令耳目聰明身強體輕爾時太上老君説此真經救生保命永無災障生生過道世世逢真若能抄寫此經受持供養永保平安夀算延長咸仰皈依信受奉行太上老君説救生真經
  hash: sha256:0a71a8928810f6d96e5c9fca4fa549801a1f19828a218420e356099f15a54265
