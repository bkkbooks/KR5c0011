front:
  text: 七經同卷傷四
  hash: sha256:710d2884d8261d8aaf3b9d83d23d3c88fdd01dc2e671f93abaff2c2ce6e7d748
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0011_HFL_000-001a, image: hfl/0341/0341-141.png}
body:
  text: 太上老君說救生眞經太上老君說消災經太上太清天童䕶命妙經太上太清皇老帝君運雷天童隱梵仙經太上老君說安宅八陽經太上老君說補謝八陽經太上說十錬生神救䕶經太上老君說救生眞經爾時太上老君與八千徒衆在紫微宫中瑠璃七寳殿上廣說妙法讃歎世間中國男子女人光如日月持齋存念眞經所有非災横禍盡乞消除廣布受生延年益筭千𡨚和釋萬惡潜藏災害不生禍亂不作罪障消沉福祥臻集爾時太上老君敕令六甲六丁守護受經之人常使永無殃咎疾病不侵四時平善八節康寧盜賊潜藏妖恠伏匿念誦此經一七偏至二七徧乃至三七徧功徳無量慕道皆成常令耳目聦明身强體輕爾時太上老君說此眞經救生保命永無災障生生過道世世逢眞若能抄冩此經受持供養永保平安夀筭延長咸仰皈依信受奉行太上老君說救生眞經
  hash: sha256:6c975a9fae560a0a2f75704af6cceba05c8feaa1d4346c9c72fcb972199633ed
